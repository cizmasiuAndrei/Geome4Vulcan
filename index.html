<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geome4Vulcan</title>
    
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.4.1/jsxgraph.css" />
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.4.1/jsxgraphcore.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    
    <style>
        :root {
            --bg-main: #0f172a;
            --sidebar-bg: #1e293b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Panoul lateral */
        .sidebar {
            width: 360px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 1.6rem;
            color: var(--text);
            text-align: center;
        }
        
        h2 span { color: var(--accent); }

        .control-group {
            background: #111827;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .control-group h3 {
            margin: 0 0 10px 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 9px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #1e293b;
            color: #fff;
            font-size: 0.9rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .row {
            display: flex;
            gap: 6px;
        }
        
        .row-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 2px;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
        }

        button:hover { background: var(--accent-hover); }
        button.success-btn { background: var(--success); }
        button.success-btn:hover { background: #059669; }
        button.danger { background: #ef4444; }
        button.danger:hover { background: #dc2626; }

        /* Lista cu elementele adăugate */
        .items-list {
            margin-top: 5px;
            max-height: 140px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .item-tag {
            background: #1e293b;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .item-tag span.delete {
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            padding-left: 5px;
        }

        /* Zona cu graficul */
        .canvas-area {
            flex-grow: 1;
            position: relative;
            background: #ffffff;
        }

        #box {
            width: 100%;
            height: 100%;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
            .canvas-area { height: 55vh; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><span>Geome4</span>Vulcan</h2>
        
        <div class="control-group">
            <h3>Introduce $f(x)$ direct</h3>
            <div class="input-box">
                <input type="text" id="funInput" placeholder="Ex: x^2 - 3, sin(x), 2*x + 1">
            </div>
            <button onclick="addFunction()">Trasează Gf</button>
        </div>

        <div class="control-group">
            <h3>Află $f(x)$ prin 2 Puncte</h3>
            
            <div class="row-label">Punctul 1 (A)</div>
            <div class="row" style="margin-bottom: 8px;">
                <input type="number" id="2ptX1" placeholder="X1" step="any">
                <input type="number" id="2ptY1" placeholder="Y1" step="any">
            </div>

            <div class="row-label">Punctul 2 (B)</div>
            <div class="row" style="margin-bottom: 10px;">
                <input type="number" id="2ptX2" placeholder="X2" step="any">
                <input type="number" id="2ptY2" placeholder="Y2" step="any">
            </div>
            
            <button class="success-btn" onclick="calculateFunctionFromPoints()">Calculează și Trasează Gf</button>
        </div>

        <div class="control-group">
            <h3>Adaugă Punct Izolat</h3>
            <div class="input-box">
                <div class="row">
                    <input type="number" id="ptX" placeholder="X" step="any">
                    <input type="number" id="ptY" placeholder="Y" step="any">
                </div>
                <input type="text" id="ptName" placeholder="Nume (Ex: M)">
            </div>
            <button onclick="addPoint()">Plasează Punct</button>
        </div>

        <div class="control-group">
            <h3>Elemente active</h3>
            <div id="elementsList" class="items-list"></div>
        </div>

        <button class="danger" onclick="resetBoard()">Resetează Tot</button>
    </div>

    <div class="canvas-area">
        <div id="box" class="jxgbox"></div>
    </div>

    <script>
        // Inițializare plan cartezian
        var board = JXG.JSXGraph.initBoard('box', {
            boundingbox: [-8, 8, 8, -8], 
            axis: true,
            grid: true,
            showCopyright: false,
            keepaspectratio: false
        });

        var objectsMap = {};
        var objectCounter = 0;

        // 1. ADAUGĂ FUNCȚIE DIRECTĂ
        function addFunction() {
            var rawInput = document.getElementById('funInput').value.trim();
            if(!rawInput) return;

            try {
                const compiledExpr = math.compile(rawInput);
                var graph = board.create('functiongraph', [
                    function(x) { return compiledExpr.evaluate({ x: x }); }
                ], { strokeWidth: 3, strokeColor: '#6366f1' });

                var id = 'func_' + objectCounter++;
                objectsMap[id] = [graph];

                updateUIList(id, `f(x) = ${rawInput}`);
                document.getElementById('funInput').value = '';
            } catch (err) {
                alert("Eroare de sintaxă matematică! Verifică expresia.");
            }
        }

        // 2. AFLĂ F(X) ȘI TRASEAZĂ GF PRIN DOUĂ PUNCTE
        function calculateFunctionFromPoints() {
            var x1 = parseFloat(document.getElementById('2ptX1').value);
            var y1 = parseFloat(document.getElementById('2ptY1').value);
            var x2 = parseFloat(document.getElementById('2ptX2').value);
            var y2 = parseFloat(document.getElementById('2ptY2').value);

            if (isNaN(x1) || isNaN(y1) || isNaN(x2) || isNaN(y2)) {
                alert("Te rog introdu toate coordonatele pentru cele două puncte.");
                return;
            }

            if (x1 === x2) {
                alert("Pentru a determina o funcție f(x), punctele nu pot avea aceeași coordonată X (dreapta ar fi verticală, deci nu e funcție).");
                return;
            }

            // Calculăm panta (m) și ordonata la origine (n) pentru f(x) = mx + n
            // m = (y2 - y1) / (x2 - x1)
            // n = y1 - m * x1
            var m = (y2 - y1) / (x2 - x1);
            var n = y1 - m * x1;

            // Generăm textul ecuației simplificat vizual pentru utilizator
            var equationText = "";
            if (m !== 0) {
                equationText += (m === 1 ? "" : (m === -1 ? "-" : math.format(m, {precision: 4}))) + "x";
            }
            if (n !== 0) {
                if (n > 0 && m !== 0) equationText += " + ";
                if (n < 0 && m !== 0) equationText += " - ";
                equationText += math.format(Math.abs(n), {precision: 4});
            }
            if (m === 0 && n === 0) equationText = "0";

            // Desenăm punctele fizice A și B pe grafic ca repere istorice
            var pA = board.create('point', [x1, y1], {name: 'A', size: 3, color: '#10b981'});
            var pB = board.create('point', [x2, y2], {name: 'B', size: 3, color: '#10b981'});

            // Trasam graficul funcției liniare determinate
            var graph = board.create('functiongraph', [
                function(x) { return m * x + n; }
            ], { strokeWidth: 3, strokeColor: '#10b981' });

            var id = 'func_2pt_' + objectCounter++;
            // Salvăm referințele tuturor celor 3 elemente create ca să le ștergem simultan dacă apasă pe X
            objectsMap[id] = [graph, pA, pB];

            updateUIList(id, `f(x) = ${equationText} (prin A și B)`);

            // Curățăm input-urile specifice
            document.getElementById('2ptX1').value = '';
            document.getElementById('2ptY1').value = '';
            document.getElementById('2ptX2').value = '';
            document.getElementById('2ptY2').value = '';
        }

        // 3. ADAUGĂ PUNCT IZOLAT
        function addPoint() {
            var xVal = parseFloat(document.getElementById('ptX').value);
            var yVal = parseFloat(document.getElementById('ptY').value);
            var nameVal = document.getElementById('ptName').value.trim() || 'P';

            if(isNaN(xVal) || isNaN(yVal)) {
                alert("Introdu coordonate valide.");
                return;
            }

            var point = board.create('point', [xVal, yVal], {
                name: nameVal, size: 4, color: '#ec4899',
                label: { offset: [10, 10], color: '#0f172a', fontWeight: 'bold' }
            });

            var id = 'point_' + objectCounter++;
            objectsMap[id] = [point];

            updateUIList(id, `Punct ${nameVal}(${xVal}, ${yVal})`);
            
            document.getElementById('ptX').value = '';
            document.getElementById('ptY').value = '';
            document.getElementById('ptName').value = '';
        }

        // 4. MANAGEMENT INTERFAȚĂ LISTĂ
        function updateUIList(id, labelText) {
            var listDiv = document.getElementById('elementsList');
            var itemHtml = document.createElement('div');
            itemHtml.className = 'item-tag';
            itemHtml.id = 'ui_' + id;
            itemHtml.innerHTML = `
                <span>${labelText}</span>
                <span class="delete" onclick="deleteObject('${id}')">×</span>
            `;
            listDiv.appendChild(itemHtml);
        }

        // 5. ȘTERGERE OBIECTE
        function deleteObject(id) {
            if(objectsMap[id]) {
                // Iterăm prin array-ul de elemente salvate pe acel ID (ex: funcția + cele 2 puncte aferente)
                objectsMap[id].forEach(function(obj) {
                    board.removeObject(obj);
                });
                delete objectsMap[id];
                
                var uiElem = document.getElementById('ui_' + id);
                if(uiElem) uiElem.remove();
                
                board.update();
            }
        }

        // 6. RESETARE GENERALĂ
        function resetBoard() {
            for(var id in objectsMap) {
                objectsMap[id].forEach(function(obj) {
                    board.removeObject(obj);
                });
            }
            objectsMap = {};
            document.getElementById('elementsList').innerHTML = '';
            board.clearTraces();
            board.update();
        }
    </script>
</body>
</html>
